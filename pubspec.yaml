version: 10.4.2
repository: https://github.com/ggsuite/gg.git

environment:
  sdk: ">=3.8.1<4.0.0"

dependencies:
  args: ^2.7.0
  gg_one: ^10.3.0
  gg_args: ^2.0.4
  gg_console_colors: ^2.1.5
  gg_local_package_dependencies: ^1.4.0
  gg_log: ^1.0.6
  gg_process: ^1.1.6
  gg_project_root: ^1.0.4
  gg_status_printer: ^1.1.4
  mocktail: ^1.0.5
  path: ^1.9.1
